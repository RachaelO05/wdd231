<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD231 | Directory Page for Johannesburg Chamber of Commerce</title>

    <meta name="author" content="Rachael O'Moore">
    <meta name="description" content="Business Directory Page displays Chamber Member businesses in grid and list views, allowing users to browse business information and connect with local companies.">

    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/directory.css">
    <link rel="stylesheet" href="styles/directory-large.css">

    <meta property="og:title" content="Johannesburg Chamber of Commerce Directory Page">
    <meta property="og:description" content="Local organization to gather business leaders.">
    <meta property="og:image" content="#">
    <meta property="og:url" content="https://rachaelo05.github.io/wdd231/chamber/directory.html">

    <link rel="icon" href="images/favicon.ico" sizes="32x32">

    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/getdates.js" defer></script>
    <script src="scripts/businesses.js" defer></script>

<body>
    <header>
        <img src="images/logo.svg" alt="Site Logo" width="150" height="150">
        <span>Johannesburg Chamber of Commerce</span>
        <nav id="nav-bar" class="navigation">
            <ul>
                <li><a href="#">Home</a></li>
                <li class="current"><a href="https://rachaelo05.github.io/wdd231/chamber/directory.html">Directory</a></li>
                <li><a href="#">Join</a></li>
                <li><a href="#">Discover</a></li>
            </ul>
        </nav>
        <button id="ham-btn" class="hamburger" aria-label="Open navigation menu"></button>
    </header>
    <main>
        <h1>Directory</h1>
        <div class="buttons">
            <button id="grid-btn" class="grid-btn" aria-label="Grid Button">Grid</button>
            <button id="list-btn" class="list-btn" aria-label="List Button">List</button>

        <div id="cards" class="businesses"></div>

    <footer>
        <div>
            <p><strong>Johannesburg Chamber of Commerce</strong></p>
            <p>123 Main St</p>

        </div>
        <div class="social">
            <a href="https://github.com/RachaelO05/wdd231"><img src="images/github.svg" alt="Github Logo" width="100"

            <a href="https://x.com/"><img src="images/twitter.svg" alt="Twitter Logo" width="100" height="100"></a>

            <p>WDD 231 Class Project</p>
            <p>Rachael O'Moore</p>

            <span id="lastModified"></span>
